<!DOCTYPE html>
<html>
<head>
  <title>Auth Loading Test</title>
</head>
<body>
  <h1>Testing Auth Loading Pattern</h1>
  <div id="status">Loading...</div>
  
  <script>
    // Simulate the auth loading pattern
    let authLoading = true;
    let user = null;
    
    function render() {
      const status = document.getElementById('status');
      
      if (authLoading) {
        status.innerHTML = '⏳ Auth Loading... (showing PageLoading component)';
        status.style.color = 'orange';
        return;
      }
      
      if (!user) {
        status.innerHTML = '❌ No user - should redirect to /login';
        status.style.color = 'red';
        return;
      }
      
      status.innerHTML = '✅ User loaded - rendering dashboard';
      status.style.color = 'green';
    }
    
    // Initial render
    render();
    
    // Simulate auth loading after 1 second
    setTimeout(() => {
      authLoading = false;
      user = { id: '123', email: 'test@example.com' };
      render();
    }, 1000);
  </script>
</body>
</html>
