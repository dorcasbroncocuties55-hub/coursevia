services:
  - type: web
    name: coursevia-frontend
    runtime: node
    buildCommand: NODE_OPTIONS=--max-old-space-size=4096 npm run build
    startCommand: node serve.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_PROJECT_ID
        sync: false
      - key: VITE_BACKEND_URL
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CHECKOUT_PUBLIC_KEY
        sync: false
      - key: VITE_PERSONA_TEMPLATE_ID
        sync: false
